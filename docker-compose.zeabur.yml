
     抱歉没说清楚。就是下面这段，直接全选复制：

     yaml
     Zeabur cloud deployment for Hermes Agent
     Zeabur auto-detects docker-compose.yml; we override with this file.
     Set environment variables in Zeabur dashboard:
     DEEPSEEK_API_KEY (required)
     HERMES_MODEL (optional, default: deepseek-v4-pro)
     HERMES_PROVIDER (optional, default: deepseek)
     The container exposes port 9119 — Zeabur auto-assigns a public domain.

     services:
       hermes:
         build:
           context: .
           dockerfile: Dockerfile
         container_name: hermes
         restart: unless-stopped
         ports:
           - "9119:9119"
         volumes:
           - hermes_data:/opt/data
         environment:
           - PYTHONUNBUFFERED=1
           - DEEPSEEK_API_KEY
           - HERMES_MODEL=${HERMES_MODEL:-deepseek-v4-pro}
           - HERMES_PROVIDER=${HERMES_PROVIDER:-deepseek}
         command:
           - "dashboard"
           - "--host"
           - "0.0.0.0"
           - "--port"
           - "9119"
           - "--no-open"
           - "--skip-build"

     volumes:
       hermes_data:
