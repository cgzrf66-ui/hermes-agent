     yaml
     Zeabur cloud deployment for Hermes Agent
     services:
       hermes:
         build:
           context: .
           dockerfile: Dockerfile
         container_name: hermes
         restart: unless-stopped
         ports:
           - "9119:9119"
         volumes:
           - hermes_data:/opt/data
         environment:
           - PYTHONUNBUFFERED=1
           - DEEPSEEK_API_KEY
           - HERMES_MODEL=${HERMES_MODEL:-deepseek-v4-pro}
           - HERMES_PROVIDER=${HERMES_PROVIDER:-deepseek}
           - HERMES_DASHBOARD_BASIC_AUTH_USERNAME
           - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH
           - HERMES_DASHBOARD_BASIC_AUTH_SECRET
         command:
           - "dashboard"
           - "--host"
           - "0.0.0.0"
           - "--port"
           - "9119"
           - "--no-open"
           - "--skip-build"

     volumes:
       hermes_data:
